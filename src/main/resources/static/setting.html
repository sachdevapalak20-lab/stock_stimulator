<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockSim — Settings</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Animate.css -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="css/style.css" rel="stylesheet">

    <style>
        .settings-card {
            background:    var(--bg-card);
            border:        1px solid var(--border-color);
            border-radius: 20px;
            padding:       24px;
            box-shadow:    var(--shadow);
            margin-bottom: 20px;
        }

        .settings-card h6 {
            font-weight:    700;
            margin-bottom:  16px;
            color:          var(--text-secondary);
            text-transform: uppercase;
            font-size:      0.8rem;
            letter-spacing: 0.5px;
        }

        .settings-row {
            display:         flex;
            justify-content: space-between;
            align-items:     center;
            padding:         14px 0;
            border-bottom:   1px solid var(--border-color);
        }

        .settings-row:last-child {
            border-bottom: none;
        }

        .settings-label {
            font-weight: 500;
            font-size:   0.95rem;
        }

        .settings-desc {
            font-size: 0.8rem;
            color:     var(--text-secondary);
            margin-top: 2px;
        }

        /* Toggle Switch */
        .toggle-switch {
            position:       relative;
            display:        inline-block;
            width:          52px;
            height:         28px;
        }

        .toggle-switch input {
            opacity: 0;
            width:   0;
            height:  0;
        }

        .toggle-slider {
            position:          absolute;
            cursor:            pointer;
            top:               0;
            left:              0;
            right:             0;
            bottom:            0;
            background:        var(--border-color);
            border-radius:     28px;
            transition:        0.3s;
        }

        .toggle-slider:before {
            position:          absolute;
            content:           "";
            height:            20px;
            width:             20px;
            left:              4px;
            bottom:            4px;
            background:        white;
            border-radius:     50%;
            transition:        0.3s;
        }

        input:checked + .toggle-slider {
            background: var(--primary);
        }

        input:checked + .toggle-slider:before {
            transform: translateX(24px);
        }

        /* Theme Cards */
        .theme-option {
border:        2px solid var(--border-color);
border-radius: 12px;
padding:       16px;
cursor:        pointer;
transition:    all 0.3s ease;
text-align:    center;
}

.theme-option:hover {
transform: translateY(-2px);
}


        .theme-option.selected {
            border-color: var(--primary);
            background:   var(--primary-light);
        }

        .theme-option .theme-preview {
            width:         100%;
            height:        60px;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .theme-preview.light {
            background: #ffffff;
            border:     1px solid #e9ecef;
        }

        .theme-preview.dark {
            background: #0f172a;
            border:     1px solid #334155;
        }

        .theme-option .theme-name {
            font-weight: 600;
            font-size:   0.9rem;
        }

        /* Currency Options */
        .currency-option {
            border:        2px solid var(--border-color);
            border-radius: 12px;
            padding:       12px 20px;
            cursor:        pointer;
            transition:    all 0.2s;
            text-align:    center;
            font-weight:   700;
            font-size:     1.1rem;
        }

        .currency-option.selected {
            border-color: var(--primary);
            background:   var(--primary-light);
            color:        var(--primary);
        }

        .btn-danger-outline {
            background:    var(--danger-light);
            color:         var(--danger);
            border:        1px solid var(--danger);
            border-radius: 8px;
            padding:       8px 20px;
            font-weight:   600;
            cursor:        pointer;
            transition:    all 0.2s;
            font-size:     0.9rem;
        }

        .btn-danger-outline:hover {
            background: var(--danger);
            color:      white;
        }

        .btn-primary-outline {
            background:    var(--primary-light);
            color:         var(--primary);
            border:        1px solid var(--primary);
            border-radius: 8px;
            padding:       8px 20px;
            font-weight:   600;
            cursor:        pointer;
            transition:    all 0.2s;
            font-size:     0.9rem;
        }

        .btn-primary-outline:hover {
            background: var(--primary);
            color:      white;
        }
    </style>
</head>
<body>

    <!-- Alert Container -->
    <div id="alertContainer"
        class="position-fixed top-0 end-0 p-3"
        style="z-index:9999">
    </div>

    <!-- Navbar -->
    <div id="navbar"></div>

    <!-- Main Content -->
    <div class="container py-4">

        <!-- Page Header -->
        <div class="d-flex justify-content-between
                    align-items-center mb-4">
            <div>
                <h2 style="font-weight:700; margin:0;">
                    Settings
                </h2>
                <p style="color:var(--text-secondary); margin:0;">
                    Customize your experience
                </p>
            </div>
            <button class="btn-back"
                onclick="window.location.href='index.html'">
                ← Dashboard
            </button>
        </div>

        <div class="row g-4">
            <div class="col-md-8 mx-auto">

                <!-- Theme Settings -->
                <div class="settings-card
                    animate__animated animate__fadeInUp">
                    <h6>🎨 Theme</h6>
                    <div class="row g-3">
                        <div class="col-6">
                            <div class="theme-option selected"
                                id="lightThemeOption"
                                onclick="selectTheme('light')">
                                <div class="theme-preview light">
                                    <div style="padding:8px;">
                                        <div style="height:8px;
                                            background:#e9ecef;
                                            border-radius:4px;
                                            margin-bottom:4px;">
                                        </div>
                                        <div style="height:8px;
                                            width:60%;
                                            background:#e9ecef;
                                            border-radius:4px;">
                                        </div>
                                    </div>
                                </div>
                                <div class="theme-name">
                                    ☀️ Light Mode
                                </div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="theme-option"
                                id="darkThemeOption"
                                onclick="selectTheme('dark')">
                                <div class="theme-preview dark">
                                    <div style="padding:8px;">
                                        <div style="height:8px;
                                            background:#334155;
                                            border-radius:4px;
                                            margin-bottom:4px;">
                                        </div>
                                        <div style="height:8px;
                                            width:60%;
                                            background:#334155;
                                            border-radius:4px;">
                                        </div>
                                    </div>
                                </div>
                                <div class="theme-name">
                                    🌙 Dark Mode
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
