<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockSim — Order History</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Animate.css -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="css/style.css" rel="stylesheet">

    <style>
        .history-card {
            background:    var(--bg-card);
            border:        1px solid var(--border-color);
            border-radius: 20px;
            padding:       24px;
            box-shadow:    var(--shadow);
        }

        .order-badge-buy {
            background:    var(--success-light);
            color:         var(--success);
            padding:       4px 12px;
            border-radius: 20px;
            font-size:     0.8rem;
            font-weight:   700;
        }

        .order-badge-sell {
            background:    var(--danger-light);
            color:         var(--danger);
            padding:       4px 12px;
            border-radius: 20px;
            font-size:     0.8rem;
            font-weight:   700;
        }

        .empty-state {
            text-align: center;
            padding:    60px 20px;
            color:      var(--text-secondary);
        }

        .empty-state .empty-icon {
            font-size:     4rem;
            margin-bottom: 16px;
        }

        .filter-tabs {
            display:       flex;
            gap:           8px;
            margin-bottom: 20px;
            flex-wrap:     wrap;
        }

        .filter-tab {
            padding:       6px 16px;
            border:        1px solid var(--border-color);
            border-radius: 20px;
            font-size:     0.85rem;
            font-weight:   500;
            color:         var(--text-secondary);
            cursor:        pointer;
            background:    var(--bg-secondary);
            transition:    all 0.2s;
        }

        .filter-tab.active {
            background:   var(--primary);
            color:        white;
            border-color: var(--primary);
        }

        .summary-strip {
            display:       flex;
            gap:           16px;
            flex-wrap:     wrap;
            margin-bottom: 24px;
        }

        .summary-chip {
            background:    var(--bg-secondary);
            border:        1px solid var(--border-color);
            border-radius: 12px;
            padding:       12px 20px;
            flex:          1;
            min-width:     120px;
            text-align:    center;
        }

        .summary-chip .chip-value {
            font-size:   1.3rem;
            font-weight: 700;
        }

        .summary-chip .chip-label {
            font-size:  0.8rem;
            color:      var(--text-secondary);
            margin-top: 2px;
        }
    </style>
</head>
<body>

    <!-- Alert Container -->
    <div id="alertContainer"
        class="position-fixed top-0 end-0 p-3"
