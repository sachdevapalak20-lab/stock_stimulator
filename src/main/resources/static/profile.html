<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockSim — Profile</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Animate.css -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="css/style.css" rel="stylesheet">

    <style>
        .profile-header {
            background:    var(--bg-card);
            border:        1px solid var(--border-color);
            border-radius: 20px;
            padding:       32px;
            box-shadow:    var(--shadow);
            text-align:    center;
            margin-bottom: 24px;
        }

        .profile-avatar {
            width:           90px;
            height:          90px;
            border-radius:   50%;
            background:      var(--primary);
            color:           white;
            font-size:       2.5rem;
            font-weight:     700;
            display:         flex;
            align-items:     center;
            justify-content: center;
            margin:          0 auto 16px;
        }

        .profile-name {
            font-size:   1.5rem;
            font-weight: 700;
            margin:      0;
        }

        .profile-username {
            color:     var(--text-secondary);
            font-size: 0.9rem;
        }

        .profile-card {
            background:    var(--bg-card);
            border:        1px solid var(--border-color);
            border-radius: 20px;
            padding:       24px;
            box-shadow:    var(--shadow);
            margin-bottom: 20px;
        }

        .profile-card h6 {
            font-weight:   700;
            margin-bottom: 16px;
            color:         var(--text-secondary);
            text-transform: uppercase;
            font-size:     0.8rem;
            letter-spacing: 0.5px;
        }

        .info-row {
            display:         flex;
            justify-content: space-between;
            align-items:     center;
            padding:         10px 0;
            border-bottom:   1px solid var(--border-color);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color:      var(--text-secondary);
            font-size:  0.9rem;
            font-weight: 500;
        }

        .info-value {
            font-weight: 600;
            font-size:   0.9rem;
        }

        .btn-edit {
            background:    var(--primary-light);
            color:         var(--primary);
            border:        1px solid var(--primary);
            border-radius: 8px;
            padding:       8px 20px;
            font-weight:   600;
            cursor:        pointer;
            transition:    all 0.2s;
            font-size:     0.9rem;
        }

        .btn-edit:hover {
background: var(--primary);
color:      white;
transform:  translateY(-1px);
}


        .btn-logout {
            background:    var(--danger-light);
            color:         var(--danger);
            border:        1px solid var(--danger);
            border-radius: 8px;
            padding:       8px 20px;
            font-weight:   600;
            cursor:        pointer;
            transition:    all 0.2s;
            font-size:     0.9rem;
        }

        .btn-logout:hover {
background: var(--danger);
color:      white;
transform:  translateY(-1px);
}


        .holdings-item {
            display:         flex;
            justify-content: space-between;
            align-items:     center;
            padding:         10px 0;
            border-bottom:   1px solid var(--border-color);
        }

        .holdings-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>

    <!-- Alert Container -->
    <div id="alertContainer"
        class="position-fixed top-0 end-0 p-3"
        style="z-index:9999">
    </div>

    <!-- Navbar -->
    <div id="navbar"></div>

    <!-- Portfolio Bar -->
    <div id="portfolioBar"></div>

    <!-- Main Content -->
    <div class="container py-4">

        <!-- Page Header -->
        <div class="d-flex justify-content-between
                    align-items-center mb-4">
            <h2 style="font-weight:700; margin:0;">Profile</h2>
            <button class="btn-back"
                onclick="window.location.href='index.html'">
                ← Dashboard
            </button>
        </div>

        <div class="row g-4">

            <!-- Left Column -->
            <div class="col-md-4">

                <!-- Profile Header -->
                <div class="profile-header
                    animate__animated animate__fadeInLeft">
                    <div class="profile-avatar" id="profileAvatar">
                        G
                    </div>
                    <h4 class="profile-name" id="profileName">
                        Guest User
                    </h4>
                    <div class="profile-username"
                        id="profileUsername">
                        @guest
                    </div>
                    <div class="d-flex gap-2 justify-content-center mt-3">
                        <button class="btn-edit"
                            onclick="editProfile()">
                            ✏️ Edit Profile
                        </button>
                        <button class="btn-logout"
                            onclick="logout()">
                            🚪 Logout
                        </button>
                    </div>
                </div>

                <!-- Account Info -->
                <div class="profile-card">
                    <h6>Account Information</h6>
                    <div class="info-row">
                        <span class="info-label">Member Since</span>
                        <span class="info-value"
                            id="memberSince">--</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Account Type</span>
                        <span class="info-value">Demo</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Status</span>
                        <span class="info-value text-success">
                            ● Active
                        </span>
                    </div>
                </div>

            </div>

            <!-- Right Column -->
            <div class="col-md-8">

                <!-- Portfolio Summary -->
                <div class="profile-card
                    animate__animated animate__fadeInRight">
                    <h6>Portfolio Summary</h6>
                    <div class="row g-3">
                        <div class="col-6">
                            <div class="info-row">
                                <span class="info-label">
                                    Balance
                                </span>
                                <span class="info-value"
                                    id="profileBalance">--</span>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="info-row">
                                <span class="info-label">
                                    Portfolio Value
                                </span>
                                <span class="info-value"
                                    id="profilePortfolioValue">
                                    --
                                </span>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="info-row">
                                <span class="info-label">
                                    Total Invested
                                </span>
                                <span class="info-value"
                                    id="profileInvested">--</span>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="info-row">
                                <span class="info-label">
                                    Profit / Loss
                                </span>
                                <span class="info-value"
                                    id="profileProfitLoss">--</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Trading Stats -->
                <div class="profile-card">
                    <h6>Trading Statistics</h6>
                    <div class="info-row">
                        <span class="info-label">Total Orders</span>
                        <span class="info-value"
                            id="profileTotalOrders">--</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Buy Orders</span>
                        <span class="info-value text-success"
                            id="profileBuyOrders">--</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Sell Orders</span>
                        <span class="info-value text-danger"
                            id="profileSellOrders">--</span>
                    </div>
                </div>

                <!-- Current Holdings -->
                <div class="profile-card">
                    <h6>Current Holdings</h6>
                    <div id="holdingsList">
                        <div class="text-center
                                    text-secondary py-3">
                            Loading holdings...
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Footer -->
    <div id="footer"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/components.js"></script>
    <script src="js/profile.js"></script>

    <script>
        Utils.requireLogin();
        document.getElementById('navbar').innerHTML  = Components.navbar('profile');
        document.getElementById('footer').innerHTML  = Components.footer();
    </script>

</body>
</html>
