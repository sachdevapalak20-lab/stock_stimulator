<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockSim — Confirm Order</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Animate.css -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="css/style.css" rel="stylesheet">

    <style>
        .confirm-card {
            max-width:     550px;
            margin:        0 auto;
            background:    var(--bg-card);
            border:        1px solid var(--border-color);
            border-radius: 24px;
            padding:       36px;
            box-shadow:    var(--shadow);
        }

        .confirm-row {
            display:         flex;
            justify-content: space-between;
            align-items:     center;
            padding:         12px 0;
            border-bottom:   1px solid var(--border-color);
        }

        .confirm-row:last-child {
            border-bottom: none;
        }

        .confirm-label {
            color:      var(--text-secondary);
            font-size:  0.9rem;
            font-weight: 500;
        }

        .confirm-value {
            font-weight: 700;
            font-size:   0.95rem;
        }

        .confirm-total {
            background:    var(--bg-secondary);
            border-radius: 12px;
            padding:       16px 20px;
            margin-top:    16px;
        }

        .price-changed-alert {
            background:    var(--warning-light);
            border:        1px solid var(--warning);
            border-radius: 12px;
            padding:       14px 18px;
            margin-bottom: 20px;
            display:       none;
        }

        .price-changed-alert.show {
            display: block;
        }

        .btn-confirm {
            width:         100%;
            padding:       14px;
            border:        none;
            border-radius: 12px;
            font-size:     1.1rem;
            font-weight:   700;
            cursor:        pointer;
            transition:    all 0.2s;
            margin-top:    20px;
        }

        .btn-confirm-buy {
            background: var(--success);
            color:      white;
        }

        .btn-confirm-buy:hover {
            background: #15803d;
            transform:  translateY(-2px);
        }

        .btn-confirm-sell {
            background: var(--danger);
            color:      white;
        }

        .btn-confirm-sell:hover {
            background: #b91c1c;
            transform:  translateY(-2px);
        }

        .btn-cancel {
            width:         100%;
            padding:       12px;
            border:        1px solid var(--border-color);
            border-radius: 12px;
            font-size:     1rem;
            font-weight:   600;
            cursor:        pointer;
            background:    var(--bg-secondary);
            color:         var(--text-secondary);
            margin-top:    10px;
            transition:    all 0.2s;
        }

        .btn-cancel:hover {
            border-color: var(--danger);
            color:        var(--danger);
        }

        .success-overlay {
            display:         none;
            position:        fixed;
            top:             0;
            left:            0;
            width:           100%;
            height:          100%;
            background:      rgba(0,0,0,0.5);
            z-index:         9999;
            align-items:     center;
            justify-content: center;
        }

        .success-overlay.show {
            display: flex;
        }

        .success-box {
            background:    var(--bg-card);
            border-radius: 24px;
            padding:       40px;
            text-align:    center;
            max-width:     380px;
            width:         90%;
            animation:     bounceIn 0.5s ease;
        }

        .success-icon {
            font-size:     4rem;
            margin-bottom: 16px;
        }

        @keyframes bounceIn {
            0%   { transform: scale(0.5); opacity: 0; }
            70%  { transform: scale(1.1); }
            100% { transform: scale(1);   opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- Alert Container -->
    <div id="alertContainer"
        class="position-fixed top-0 end-0 p-3"
        style="z-index:9998">
    </div>

    <!-- Success Overlay -->
    <div class="success-overlay" id="successOverlay">
        <div class="success-box">
            <div class="success-icon">✅</div>
            <h3 style="font-weight:700; margin-bottom:8px;">
                Order Placed!
            </h3>
            <p style="color:var(--text-secondary);"
               id="successMessage">
            </p>
            <button class="btn-confirm btn-confirm-buy mt-3"
                onclick="window.location.href='index.html'">
                Back to Dashboard
            </button>
            <button class="btn-cancel"
                onclick="window.location.href='history.html'">
                View Order History
            </button>
        </div>
    </div>

    <!-- Navbar -->
    <div id="navbar"></div>

    <!-- Portfolio Bar -->
    <div id="portfolioBar"></div>

    <!-- Main Content -->
    <div class="container py-4">

        <!-- Back Button -->
        <button class="btn-back mb-4"
            onclick="history.back()">
            ← Back
        </button>

        <!-- Page Title -->
        <div class="text-center mb-4">
            <h2 style="font-weight:700;">Confirm Order</h2>
            <p style="color:var(--text-secondary);">
                Review your order before confirming
            </p>
        </div>

        <!-- Confirm Card -->
        <div class="confirm-card animate__animated animate__fadeInUp">

            <!-- Price Changed Warning -->
            <div class="price-changed-alert"
                id="priceChangedAlert">
                ⚠️ Price has changed since you opened the order form.
                Please review the updated price below.
            </div>

            <!-- Order Details -->
            <div class="confirm-row">
                <span class="confirm-label">Stock</span>
                <span class="confirm-value"
                    id="confirmSymbol">--</span>
            </div>

            <div class="confirm-row">
                <span class="confirm-label">Order Type</span>
                <span class="confirm-value"
                    id="confirmType">--</span>
            </div>

            <div class="confirm-row">
                <span class="confirm-label">Quantity</span>
                <span class="confirm-value"
                    id="confirmQuantity">--</span>
            </div>

            <div class="confirm-row">
                <span class="confirm-label">Price When Opened</span>
                <span class="confirm-value"
                    id="confirmOpenPrice">--</span>
            </div>

            <div class="confirm-row">
                <span class="confirm-label">Current Price</span>
                <span class="confirm-value"
                    id="confirmCurrentPrice">--</span>
            </div>

            <!-- Total -->
            <div class="confirm-total">
                <div class="d-flex justify-content-between">
                    <span style="font-weight:600;">
                        Total Amount
                    </span>
                    <span style="font-weight:700;
                                 font-size:1.2rem;
                                 color:var(--primary);"
                        id="confirmTotal">
                        --
                    </span>
                </div>
            </div>

            <!-- Confirm Button -->
            <button class="btn-confirm"
                id="confirmBtn"
                onclick="confirmOrder()">
                Confirm Order
            </button>

            <!-- Cancel Button -->
            <button class="btn-cancel"
                onclick="history.back()">
                Cancel
            </button>

        </div>
    </div>

    <!-- Footer -->
    <div id="footer"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/components.js"></script>
    <script src="js/confirm.js"></script>

    <script>
        Utils.requireLogin();
        document.getElementById('navbar').innerHTML  = Components.navbar('dashboard');
        document.getElementById('footer').innerHTML  = Components.footer();
    </script>

</body>
</html>
