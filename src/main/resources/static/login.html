<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockSim — Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Animate.css -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="css/style.css" rel="stylesheet">

    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #eff6ff 0%, #ffffff 50%, #f0fdf4 100%);
        }

        [data-theme="dark"] .login-wrapper {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: 24px;
            background: var(--bg-card);
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
        }

        .login-logo {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 8px;
        }

        .login-title {
            text-align: center;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .login-subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 32px;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-login {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            transition: all 0.2s;
        }

        .btn-login:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(37,99,235,0.3);
        }

        .divider {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin: 20px 0;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 42%;
            height: 1px;
            background: var(--border-color);
        }

        .divider::before { left: 0; }
        .divider::after  { right: 0; }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .tab-btn:first-child {
            border-radius: 8px 0 0 8px;
        }

        .tab-btn:last-child {
            border-radius: 0 8px 8px 0;
        }

        .theme-top {
            position: fixed;
            top: 20px;
            right: 20px;
        }
    </style>
</head>
<body>

    <!-- Theme Toggle -->
    <div class="theme-top">
        <button class="theme-toggle"
            id="themeToggle"
            onclick="ThemeManager.toggle()">
            🌙 Dark Mode
        </button>
    </div>

    <!-- Alert Container -->
    <div id="alertContainer"
        class="position-fixed top-0 end-0 p-3"
        style="z-index:9999">
    </div>

    <!-- Login Wrapper -->
    <div class="login-wrapper">
        <div class="login-card animate__animated animate__fadeInUp">

            <!-- Logo -->
            <div class="login-logo">📈</div>
            <div class="login-title">StockSim</div>
            <div class="login-subtitle">Your Personal Stock Market Simulator</div>

            <!-- Tabs -->
            <div class="d-flex mb-4">
                <button class="tab-btn active"
                    id="loginTab"
                    onclick="switchTab('login')">
                    Login
                </button>
                <button class="tab-btn"
                    id="registerTab"
                    onclick="switchTab('register')">
                    Register
                </button>
            </div>

            <!-- Login Form -->
            <div id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text"
                        class="form-control"
                        id="loginUsername"
                        placeholder="Enter username">
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password"
                        class="form-control"
                        id="loginPassword"
                        placeholder="Enter password">
                </div>
                <button class="btn-login" onclick="handleLogin()">
                    Login →
                </button>
            </div>

            <!-- Register Form -->
            <div id="registerForm" style="display:none">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text"
                        class="form-control"
                        id="registerName"
                        placeholder="Enter full name">
                </div>
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text"
                        class="form-control"
                        id="registerUsername"
                        placeholder="Choose username">
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password"
                        class="form-control"
                        id="registerPassword"
                        placeholder="Choose password">
                </div>
                <button class="btn-login" onclick="handleRegister()">
                    Create Account →
                </button>
            </div>

            <!-- Divider -->
            <div class="divider mt-4">Demo Account</div>

            <!-- Demo Login -->
            <button class="btn-login mt-2"
                style="background: var(--bg-secondary);
                       color: var(--text-primary);
                       border: 1px solid var(--border-color);"
                onclick="demoLogin()">
                🚀 Continue as Guest
            </button>

        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/utils.js"></script>

    <script>
        // Switch between login and register tabs
        function switchTab(tab) {
            if (tab === 'login') {
                document.getElementById('loginForm').style.display    = 'block';
                document.getElementById('registerForm').style.display = 'none';
                document.getElementById('loginTab').classList.add('active');
                document.getElementById('registerTab').classList.remove('active');
            } else {
                document.getElementById('loginForm').style.display    = 'none';
                document.getElementById('registerForm').style.display = 'block';
                document.getElementById('loginTab').classList.remove('active');
                document.getElementById('registerTab').classList.add('active');
            }
        }

        // Handle login
        function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            if (!username || !password) {
                Utils.showAlert('Please enter username and password', 'danger');
                return;
            }

            // Get registered users
            const users = Utils.getLocal('users') || [];
            const user  = users.find(u => u.username === username && u.password === password);

            if (!user) {
                Utils.showAlert('Invalid username or password', 'danger');
                return;
            }

            // Save logged in user
            Utils.saveLocal('user', user);
            window.location.href = 'index.html';
        }

        // Handle register
        function handleRegister() {
            const name     = document.getElementById('registerName').value.trim();
            const username = document.getElementById('registerUsername').value.trim();
            const password = document.getElementById('registerPassword').value.trim();

            if (!name || !username || !password) {
                Utils.showAlert('Please fill all fields', 'danger');
                return;
            }

            // Get existing users
            const users = Utils.getLocal('users') || [];

            // Check if username exists
            if (users.find(u => u.username === username)) {
                Utils.showAlert('Username already taken', 'danger');
                return;
            }

            // Create new user
            const newUser = {
                name,
                username,
                password,
                createdAt: Date.now()
            };

            users.push(newUser);
            Utils.saveLocal('users', users);
            Utils.saveLocal('user', newUser);

            Utils.showAlert('Account created successfully!', 'success');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        }

        // Demo login as guest
        function demoLogin() {
            const guest = {
                name:      'Guest User',
                username:  'guest',
                password:  '',
                createdAt: Date.now()
            };
            Utils.saveLocal('user', guest);
            window.location.href = 'index.html';
        }

        // If already logged in go to dashboard
        if (Utils.isLoggedIn()) {
            window.location.href = 'index.html';
        }
    </script>

</body>
</html>
